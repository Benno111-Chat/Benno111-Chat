<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>All Appeals – Moderator View</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url("https://fonts.googleapis.com/css2?family=Jaro&display=swap");
  body {
    background:#0f172a;
    color:#e2e8f0;
    font-family:"Jaro", "Jaro-Regular", sans-serif;
    margin:0;
    padding:20px;
  }
  h1 { margin-top:0; }
  .card {
    background:#1e293b;
    padding:14px;
    margin-bottom:12px;
    border-radius:8px;
    border:1px solid #334155;
  }
  .card-actions {
    margin-top:12px;
    display:flex;
    gap:8px;
  }
  .delete-btn {
    background:#ef4444;
    border:none;
    color:#fff;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
  }
  .delete-btn:disabled {
    opacity:0.6;
    cursor:not-allowed;
  }
  .status-open { color:#22c55e; }
  .status-approved { color:#38bdf8; }
  .status-rejected { color:#ef4444; }
</style>

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="shortcut icon" href="/favicon.ico">
</head>
<body>
<h1>All Ban Appeals</h1>

<div id="list"></div>

<script>
function fmt(ts) {
  return new Date(ts).toLocaleString();
}

async function loadAppeals() {
  const token = localStorage.getItem("token");

  const res = await fetch("/api/appeals", {
    headers:{
      "Authorization":"Bearer " + token
    }
  });

  const data = await res.json();
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.appeals.forEach(a => {
    const box = document.createElement("div");
    box.className = "card";

    box.innerHTML = `
      <div style="display:flex; justify-content:space-between;">
        <b>Appeal #${a.id}</b>
        <span class="status-${a.status}">${a.status}</span>
      </div>

      <div style="margin-top:5px;">
        <b>User:</b> ${a.username}
      </div>

      <div style="margin-top:10px; white-space:pre-wrap;">
        ${a.message}
      </div>

      <div style="margin-top:10px; color:#94a3b8;">
        ${fmt(a.ts)}
      </div>
    `;

    const actions = document.createElement("div");
    actions.className = "card-actions";
    const delBtn = document.createElement("button");
    delBtn.className = "delete-btn";
    delBtn.textContent = "Delete Appeal";
    delBtn.onclick = () => deleteAppeal(a.id);
    actions.appendChild(delBtn);
    box.appendChild(actions);

    list.appendChild(box);
  });
}

async function deleteAppeal(id) {
  if (!confirm(`Delete appeal #${id}?`)) return;
  const token = localStorage.getItem("token");
  const btns = document.querySelectorAll(".delete-btn");
  btns.forEach((b) => (b.disabled = true));
  const res = await fetch(`/api/appeals/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": "Bearer " + token,
    },
  });
  btns.forEach((b) => (b.disabled = false));
  if (res.ok) {
    loadAppeals();
  } else {
    alert("Failed to delete appeal.");
  }
}

loadAppeals();
</script>
</body>
</html>
