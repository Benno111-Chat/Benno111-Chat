<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Embed Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b1220;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <script src="/embed-login.js" data-post-origin="*"></script>
  <script>
    // Forward the login event to the parent window for iframe usage.
    window.addEventListener("chatLoginSuccess", (e) => {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(
          { type: "chatLoginSuccess", payload: e.detail },
          "*"
        );
      }
    });
  </script>
</body>
</html>
