<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moderator Logs</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="shortcut icon" href="/favicon.ico">
</head>
<body>

<div class="app-root">
  <h1 class="page-title">Moderator Logs</h1>

  <div class="panel" style="height:400px;overflow:auto;padding:8px;">
    <table id="logsTable" style="width:100%;border-collapse:collapse;font-size:10px;">
      <thead>
        <tr>
          <th>ID</th>
          <th>Actor</th>
          <th>Action</th>
          <th>Target</th>
          <th>Details</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const token = localStorage.getItem("token");

async function loadLogs() {{
  if (!token) return;
  const res = await fetch("/api/modLogs", {{
    headers: {{ "Authorization":"Bearer " + token }}
  }});
  if (!res.ok) return;
  const data = await res.json();
  const tbody = document.querySelector("#logsTable tbody");
  tbody.innerHTML = "";
  data.logs.forEach(log => {{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${{log.id}}</td>
      <td>${{log.actor}}</td>
      <td>${{log.action}}</td>
      <td>${{log.target}}</td>
      <td>${{log.details}}</td>
      <td>${{new Date(log.ts).toLocaleString()}}</td>
    `;
    tbody.appendChild(tr);
  }});
}}

loadLogs();
</script>

</body>
</html>
